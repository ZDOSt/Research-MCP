name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit-and-compose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m pip check
      - run: python -m pip_audit -r requirements.txt
      - run: python -m compileall -q .
      - run: python -m ruff check . --select E9,F
      - run: python -m bandit -r . -x ./.venv,./tests -ll -ii
      - name: Run tests
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short 2>&1 | tee pytest-output.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "## Pytest failure"
              echo '```text'
              tail -n 200 pytest-output.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            message="$(tail -n 200 pytest-output.log | python -c 'import sys; print(sys.stdin.read().replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))')"
            echo "::error title=Pytest failure::$message"
          fi
          exit "$status"
      - run: docker compose config --quiet
      - name: Validate read-only SearXNG config mount
        env:
          SEARXNG_IMAGE: alpine:3.21
          SEARXNG_SECRET: ci-only-searxng-secret
        run: |
          docker compose create searxng
          docker compose rm --force --stop searxng
      - name: Validate zero-port client-network deployment
        env:
          MCP_CLIENT_NETWORK: ci-client-network
          MCP_AUTH_TOKEN: ci-only-token
        run: |
          docker compose -f docker-compose.yml -f docker-compose.client-network.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.client-network.yml config --format json |
            python -c 'import json, sys; gateway = json.load(sys.stdin)["services"]["mcp-gateway"]; assert not gateway.get("ports"), gateway.get("ports"); assert "research-mcp" in gateway["networks"]["client-network"]["aliases"]'
